<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empleados Ficticios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="index.js" defer></script>
</head>
<body>
  <main class="panel">
    <section class="hero">
      <h1 class="title">Directorio de Empleados Ficticios</h1>
      <p class="subtitle">Genera una lista con tu endpoint y visualizala en tabla.</p>

      <form id="form-empleados" class="controls">
        <label for="cantidad">Cantidad</label>
        <input id="cantidad" name="cantidad" type="number" min="1" max="1000" value="10" required />
        <button type="submit">Generar</button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>

    <section class="table-wrap">
      <table aria-label="Tabla de empleados ficticios">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Telefono</th>
            <th>Puesto</th>
            <th>Departamento</th>
            <th>Salario</th>
          </tr>
        </thead>
        <tbody id="empleados-body"></tbody>
      </table>
    </section>
  </main>
</body>
</html>
